server.port=0
spring.application.name=cours-service

# Base de donnťes H2 pour les tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Dťsactiver Eureka pour les tests
eureka.client.enabled=false
eureka.client.fetch-registry=false
eureka.client.register-with-eureka=false

# Disable OAuth2 / Keycloak security for tests (single line, no backslash)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration




# WebSocket (si utilisť)
spring.websocket.enabled=true

# Logging
logging.level.tn.esprit.cours_service=DEBUG

# Compatibilitť Spring Cloud
spring.cloud.compatibility-verifier.enabled=false