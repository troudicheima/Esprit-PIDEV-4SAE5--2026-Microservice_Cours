spring.application.name=Cours_Service
#spring.datasource.url=jdbc:mysql://host.docker.internal:3306/ma_basespring.datasource.username=root
#spring.datasource.password=
#spring.datasource.url=jdbc:mysql://localhost:3306/ma_base?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.url=jdbc:mysql://mysql.default.svc.cluster.local:3306/ma_base?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.password=root

server.servlet.context-path=/Cours_Service
server.port=5059
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true


# Eureka
#eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
